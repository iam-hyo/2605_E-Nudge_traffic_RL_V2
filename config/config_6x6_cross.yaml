# config_6x6_cross.yaml
# 0521 6x6_cross 실험 전용 설정 — main config.yaml(강남구) 을 건드리지 않고
# 6x6_cross / cross_main / peak 실험을 재현하기 위한 별도 설정.
# 사용: python -c "from experiments.run_experiment import main; main('config/config_6x6_cross.yaml')"
data:
  topology: data/6x6_cross_topology.json
  speed: data/6x6_cross_speed_data.csv
experiments:
  # 사용자 지정 3개 모델만 실험
  models:
    shortest_dijkstra: true
    static_fuel_dijkstra: true
    rl_signal_attention: true
    rl_base: false
    rl_signal: false
  repeat: 30
  routes:
  - goal: '36'
    name: cross_main
    start: '1'
    type: long
  time_slots:
  - label: off_peak
    start_hour: 7.0
  - label: peak
    start_hour: 8.0
  # 실제 실험 범위: 메인 경로 1→36 · 피크 08:00 · 30회
  experiment_route: cross_main
  experiment_time_slot: peak
output:
  model_dir: models
  result_dir: output
physics:
  accel_ms2: 2.5
  ifc_ml_s: 0.5
  speed_min_kmh: 5.0
  speed_noise: 0.2
  v_turn_left_kmh: 30.0
  v_turn_right_kmh: 20.0
reward:
  alpha: 1.0
  arrival_bonus: 200.0
  penalty_dead: 0.0
  penalty_timeout: 0.0
train:
  batch_size: 128
  checkpoint_every: 600
  episodes: 2400
  epsilon_decay: 0.9999
  epsilon_min: 0.05
  epsilon_start: 1.0
  gamma: 0.97
  log_interval: 50
  lr: 0.0005
  memory_size: 50000
  multi_route: true
  shaping_weight: 0.0
  target_update: 25
  warmup_steps: 1500
  train_max_steps: 120
