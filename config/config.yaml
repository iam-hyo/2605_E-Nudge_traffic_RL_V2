data:
  # 주 실험 토폴로지 (run_experiment.py / simulation.py 가 사용)
  topology: data/6x6_cross_topology.json
  speed: data/6x6_cross_speed_data.csv
experiments:
  models:
    rl_base: true
    rl_signal: true
    rl_signal_attention: true
    shortest_dijkstra: true
    static_fuel_dijkstra: true
  repeat: 30
  # routes / time_slots = 학습 다양성용 (6x6_cross 내부).
  # 실제 실험 범위는 experiment_route / experiment_time_slot 으로 별도 지정.
  routes:
  - goal: '36'                 # 핵심: 1→36 (col 2 = 최장·신호우호 채택 유도)
    name: cross_main
    start: '1'
    type: long
  - goal: '33'
    name: cross_aux1
    start: '3'
    type: long
  - goal: '32'
    name: cross_aux2
    start: '2'
    type: long
  - goal: '31'
    name: cross_aux3
    start: '1'
    type: long
  time_slots:
  - label: off_peak
    start_hour: 7.0
  - label: peak
    start_hour: 8.0
  # ── 실제 실험 범위 (사용자 지정: 경로 하나 · 피크타임 · 30회) ──
  experiment_route: cross_main
  experiment_time_slot: peak
output:
  model_dir: models
  result_dir: output
physics:
  accel_ms2: 2.5
  ifc_ml_s: 0.5
  speed_min_kmh: 5.0
  speed_noise: 0.2
  v_turn_left_kmh: 30.0
  v_turn_right_kmh: 20.0
reward:
  alpha: 1.0           # 연료 패널티 계수 (mL 기준)
  arrival_bonus: 200.0
  penalty_dead: 0.0
  penalty_timeout: 0.0
train:
  batch_size: 128
  checkpoint_every: 600
  episodes: 2400
  epsilon_decay: 0.9999
  epsilon_min: 0.05
  epsilon_start: 1.0
  gamma: 0.97
  log_interval: 50
  lr: 0.0005
  memory_size: 50000
  multi_route: true
  shaping_weight: 0.0
  target_update: 25
  warmup_steps: 1500
  # ── 다중 토폴로지 학습 (엣지-상대적 행동 공간으로 가능해짐) ──
  # 매 에피소드 weight 비례로 토폴로지 선택 → 한 모델이 여러 도로망을 동시 학습.
  train_max_steps: 120          # 학습 시 에피소드 길이 상한 (토폴로지 공통)
  topologies:
  - topology: data/6x6_cross_topology.json
    speed: data/6x6_cross_speed_data.csv
    weight: 0.60
    use_config_routes: true
    primary_boost: 2            # 주 실험 경로(cross_main) 추가 복제 → 학습 비중 ↑
  - topology: data/10x10_topology.json
    speed: data/10x10_speed_data.csv
    weight: 0.22
    n_random_routes: 16
  - topology: data/gangnam_clean_topology.json
    speed: data/gangnam_clean_speed_data.csv
    weight: 0.18
    n_random_routes: 20
