data:
  speed: data/6x6_speed_data.csv
  topology: data/6x6_topology.json
experiments:
  models:
    rl_base: true
    rl_signal: true
    rl_signal_attention: true
    shortest_dijkstra: true
    static_fuel_dijkstra: true
  repeat: 30
  routes:
  # 6x6 테스트베드 — 모든 경로가 "코어 직진(신호 빡빡) vs 외곽 우회(신호 유함)" 갈등 유발
  - goal: '18'                 # 우측 중단 — 사용자 예시 경로
    name: short_01
    start: '1'                 # 좌하단
    type: short
  - goal: '24'                 # 우측 row3
    name: short_02
    start: '7'                 # 좌측 row1
    type: short
  - goal: '36'                 # 우상단 (대각선)
    name: long_01
    start: '1'
    type: long
  - goal: '31'                 # 좌상단 (반대 대각선)
    name: long_02
    start: '6'                 # 우하단
    type: long
  time_slots:
  - label: off_peak
    start_hour: 7.0
  - label: peak
    start_hour: 8.0
output:
  model_dir: models
  result_dir: output
physics:
  accel_ms2: 2.5
  ifc_ml_s: 0.5
  speed_min_kmh: 5.0
  speed_noise: 0.2
  v_turn_left_kmh: 30.0
  v_turn_right_kmh: 20.0
reward:
  alpha: 1.0           # 연료 패널티 계수 (mL 기준)
  arrival_bonus: 500.0
  penalty_dead: 0.0    # 단일화: 도착 보너스 미수령이 자연 패널티
  penalty_timeout: 0.0
train:
  batch_size: 128
  checkpoint_every: 300
  episodes: 800          # 6x6 테스트베드용 — 강남구 전환 시 3000으로 복귀 권장
  epsilon_decay: 0.997
  epsilon_min: 0.05
  epsilon_start: 1.0
  gamma: 0.97
  log_interval: 50
  lr: 0.0005
  memory_size: 50000
  multi_route: true
  shaping_weight: 0.0  # 단일화: 연료 + 도착만으로 학습 (potential-based shaping 비활성화)
  target_update: 25
  warmup_steps: 800
